    <body>
      <script>
        (function () {
          const hasBuiltBundle = Boolean(
            document.querySelector('script[src^="./assets/"], script[src*="/assets/"]'),
          );

          if (hasBuiltBundle || window.location.pathname.startsWith("/dist")) {
            return;
          }

          try {
            const request = new XMLHttpRequest();
            request.open("HEAD", "/@vite/client", false);
            request.send(null);

            if (request.status >= 200 && request.status < 400) {
              return;
            }
          } catch (error) {
            // Fall through to the built output when a plain static server is used.
          }

          window.location.replace(new URL("./dist/", window.location.href).toString());
        })();
      </script>
      <div id="root"></div>
    </body>
  </html>
